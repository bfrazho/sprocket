name: Rust CI

on:
  push:
    branches:
      - main
      - githubActions
  pull_request:

jobs:
  # format:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v3
  #     - name: Update Rust
  #       run: rustup update nightly && rustup default nightly
  #     - name: Install rustfmt
  #       run: rustup component add rustfmt
  #     - run: cargo fmt -- --check

  # lint:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v3
  #     - name: Update Rust
  #       run: rustup update stable && rustup default stable
  #     - name: Install clippy
  #       run: rustup component add clippy
  #     - run: cargo clippy --all-features -- --deny warnings

  test:
    runs-on: ${{ matrix.os }}
    env: 
      DOCKER_DEFAULT_PLATFORM: "linux/amd64"
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025] #, macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v3
      - name: Update Rust
        run: rustup update stable && rustup default stable
      - name: Setup Docker Mac
        if: ${{'macos-latest' == matrix.os}}
        run: |
          brew update
          brew install docker
          brew install qemu
          brew install colima
          brew install lima-additional-guestagents
          # M1 and M2 Macs that the Github Actions supplies don't support nested virtualization. This forces x86 emulation to get around this
          colima start --network-address --arch x86_64
      - name: Setup WSL Windows
        if: ${{'windows-2025' == matrix.os}}
        uses: Vampire/setup-wsl@v5
      - name: Setup Docker Windows
        if: ${{'windows-2025' == matrix.os}}
        run: |
          # curl --url "https://desktop.docker.com/win/main/amd64/Docker%20Desktop%20Installer.exe" -o DockerDesktopInstaller.exe
          # echo "finished downloading. Starting install"
          # Start-Process 'DockerDesktopInstaller.exe' -Wait -ArgumentList 'install', '--quiet', '--accept-license'
          # echo "finished install"
          curl -L --url "https://github.com/rancher-sandbox/rancher-desktop/releases/download/v1.19.1/Rancher.Desktop.Setup.1.19.1.msi" -o RancherDesktopInstaller.msi
          Start-Process msiexec.exe -Wait -ArgumentList "/package `"$pwd\RancherDesktopInstaller.msi`" /norestart /passive" -Verb runAs;
          #rancher --help
          Add-Content $env:GITHUB_PATH "C:\Program Files\Rancher Desktop\resources\resources\win32\bin"
      - name: run docker
        run: |
          rdctl start --application.start-in-background --container-engine.name moby
          rdctl version
          docker --help
          docker info
          docker pull --platform linux/amd64 alpine:latest
          docker run --platform linux/amd64 alpine
          
      - name: Run tests
        run: cargo test --all-features

  # docs:

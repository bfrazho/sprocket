name: Rust CI

on:
  push:
    branches:
      - main
      - githubActions
  pull_request:

jobs:
  # format:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v3
  #     - name: Update Rust
  #       run: rustup update nightly && rustup default nightly
  #     - name: Install rustfmt
  #       run: rustup component add rustfmt
  #     - run: cargo fmt -- --check

  # lint:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v3
  #     - name: Update Rust
  #       run: rustup update stable && rustup default stable
  #     - name: Install clippy
  #       run: rustup component add clippy
  #     - run: cargo clippy --all-features -- --deny warnings

  test:
    runs-on: ${{ matrix.os }}
    env: 
      DOCKER_DEFAULT_PLATFORM: "linux/amd64"
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025] #, macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v3
      - name: Update Rust
        run: rustup update stable && rustup default stable
      - name: Setup Docker Mac
        if: ${{'macos-latest' == matrix.os}}
        run: |
          brew update
          brew install docker
          brew install qemu
          brew install colima
          brew install lima-additional-guestagents
          # M1 and M2 Macs that the Github Actions supplies don't support nested virtualization. This forces x86 emulation to get around this
          colima start --network-address --arch x86_64
      - name: Setup WSL Windows
        if: ${{'windows-2025' == matrix.os}}
        uses: Vampire/setup-wsl@v5
      - name: Setup Docker Windows
        if: ${{'windows-2025' == matrix.os}}
        run: |
          # curl -L --url "https://github.com/rancher-sandbox/rancher-desktop/releases/download/v1.19.1/Rancher.Desktop.Setup.1.19.1.msi" -o RancherDesktopInstaller.msi
          # Start-Process msiexec.exe -Wait -ArgumentList "/package `"$pwd\RancherDesktopInstaller.msi`" /norestart /passive" -Verb runAs;
          # Add-Content $env:GITHUB_PATH "C:\Program Files\Rancher Desktop\resources\resources\win32\bin"

          curl -L --url "https://github.com/containers/podman/releases/download/v5.5.1/podman-5.5.1-setup.exe" -o Podman.exe
          Start-Process Podman.exe -Wait -ArgumentList "/norestart /passive" -Verb runAs;
          Add-Content $env:GITHUB_PATH "C:\Program Files\RedHat\Podman\"
      - name: run docker
        run: |
          # rdctl start --application.auto-start --application.start-in-background --container-engine.name moby
          # rdctl create-profile --input - --output reg
          # rdctl version
          # rdctl shell ls -CF /tmp
          # wsl --set-default rancher-desktop
          podman machine init
          podman machine set --rootful
          podman machine start
          $env:DOCKER_HOST='npipe:////./pipe/podman-machine-default'
          
      - name: Run tests
        run: |
          $env:DOCKER_HOST='npipe:////./pipe/podman-machine-default
          cargo test --all-features

  # docs:
